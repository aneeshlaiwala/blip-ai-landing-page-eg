    <script>
        // Raw Markdown Content
        const rawMarkdown = "# Survey Title: India FMCG Laundry Detergent Category & Product Innovation Study\n\n\"Thank you for participating in this survey. It will not take more than 15 minutes. Your input is critical and please give your unbiased view. Please take time to think through before answering.\"\n\n---\n\n**Q1. [Single Select]** What is your gender?\n1. Female\n2. Male\n3. Non-binary / Prefer not to say\n\n> **Researcher Note:**\n> *   **Analysis:** Quota Management.\n> *   **Logic:** Terminate if 2 or 3. (Target: Females).\n> *   **Action:** Ensures category decision-maker alignment as per target audience.\n\n**Q2. [Single Select]** What is your age?\n1. Under 18\n2. 18 - 25\n3. 26 - 35\n4. 36 - 45\n5. 46 or older\n\n> **Researcher Note:**\n> *   **Analysis:** Demographic Profiling.\n> *   **Logic:** Terminate if 1 or 5. (Target: 18-45).\n> *   **Action:** Targets the core demographic for FMCG laundry products.\n\n**Q3. [Single Select]** Which type of city do you currently live in?\n1. Tier 1 / Metro Urban (e.g., Mumbai, Delhi, Bangalore)\n2. Tier 2 Urban\n3. Tier 3 Urban / Semi-Urban\n4. Rural\n\n> **Researcher Note:**\n> *   **Analysis:** Geographic Profiling.\n> *   **Logic:** Terminate if 4. (Target: Urban).\n> *   **Action:** Captures urban consumer behaviors where premiumization and washing machine penetration are highest.\n\n**Q4. [Single Select]** To help us understand your lifestyle, which of the following best describes your Monthly Household Income (Proxy for SEC A/B)?\n1. Less than ₹30,000\n2. ₹30,001 - ₹50,000\n3. ₹50,001 - ₹1,00,000\n4. Above ₹1,00,000\n\n> **Researcher Note:**\n> *   **Analysis:** Socio-Economic Classification.\n> *   **Logic:** Terminate if 1. (Target: SEC A/B equivalent).\n> *   **Action:** Ensures purchasing power aligns with premium P&G prototypes.\n\n**Q5. [Single Select]** Who is the primary decision-maker for purchasing laundry detergents in your household?\n1. I am the sole decision-maker\n2. I share the decision-making\n3. Someone else makes the decision\n\n> **Researcher Note:**\n> *   **Analysis:** Category Involvement.\n> *   **Logic:** Terminate if 3.\n> *   **Action:** Guarantees respondents are relevant category buyers.\n\n**Q6. [Single Select]** What is the primary method you use to wash clothes in your household?\n1. Fully Automatic Washing Machine (Front Load)\n2. Fully Automatic Washing Machine (Top Load)\n3. Semi-Automatic Washing Machine\n4. Hand Wash\n\n> **Researcher Note:**\n> *   **Analysis:** Usage Habits.\n> *   **Logic:** None.\n> *   **Action:** Determines product format suitability (e.g., matic powders/liquids vs. handwash bars).\n\n**Q7. [Multi Select]** Which formats of laundry detergent do you currently use? (Select all that apply)\n1. Detergent Powder\n2. Liquid Detergent\n3. Detergent Pods / Capsules\n4. Detergent Bar\n\n> **Researcher Note:**\n> *   **Analysis:** Format Penetration.\n> *   **Logic:** None.\n> *   **Action:** Identifies the shift from traditional powders to modern liquids/pods.\n\n**Q8. [Open End]** 🛑 **Disruption Insight:** What is the biggest pain point, supply issue, or frustration you currently face with your laundry routine or detergent?\n[Text Box]\n\n> **Researcher Note:**\n> *   **Analysis:** Text Analytics / Sentiment Analysis.\n> *   **Logic:** None. *[FRAUD CHECK] check for gibberish, repeated characters, or very short responses (less than 3 words).*\n> *   **Action:** Uncovers critical consumer frustrations (e.g., hard water issues, residue, supply chain stockouts) for P&G to solve.\n\n**Q9. [Single Select]** 📉 **Market Policy Change:** With recent economic inflation and changes in household budgets, how has your laundry detergent purchasing changed?\n1. I buy cheaper/discounted brands now\n2. I buy smaller pack sizes\n3. I buy in bulk during sales/promotions\n4. No change, I stick to my regular brand\n\n> **Researcher Note:**\n> *   **Analysis:** Price Sensitivity / Behavioral Shift.\n> *   **Logic:** None.\n> *   **Action:** Assesses market elasticity and the impact of macroeconomic pressures on FMCG staples.\n\n**Q10. [Multi Select]** What are the top 3 benefits you look for when choosing a laundry detergent? (Select up to 3)\n1. Tough stain removal\n2. Long-lasting fragrance\n3. Color protection\n4. Fabric softening\n5. Eco-friendly / Natural ingredients\n6. Value for money / Price\n7. Antibacterial / Germ kill\n\n> **Researcher Note:**\n> *   **Analysis:** MaxDiff / Key Driver Analysis proxy.\n> *   **Logic:** Limit selection to 3.\n> *   **Action:** Identifies primary claims to emphasize in marketing communications.\n\n**Q11. [Open End]** When you think of laundry detergents, which brand comes to your mind first?\n[Text Box]\n\n> **Researcher Note:**\n> *   **Analysis:** Top of Mind (TOM) Awareness.\n> *   **Logic:** None. *[FRAUD CHECK] check for gibberish, repeated characters, or very short responses (less than 3 words).*\n> *   **Action:** Measures ultimate brand salience before prompting.\n\n**Q12. [Multi Select]** Which of the following laundry detergent brands have you heard of? (Select all that apply)\n1. Ariel\n2. Tide\n3. Surf Excel\n4. Rin\n5. Henko\n6. Patanjali\n7. Ghadi\n8. Wheel\n9. Love & Care\n10. Born Good\n11. Others (specify)\n12. None of the above\n\n> **Researcher Note:**\n> *   **Analysis:** Prompted Brand Awareness.\n> *   **Logic:** Exclusive rule for \"None of the above\".\n> *   **Action:** Establishes the baseline brand funnel for P&G and competitors.\n\n**Q13. [Multi Select]** *(Ask only for brands aware of in Previous Question)* Which of these laundry detergent brands have you EVER used?\n1. Ariel\n2. Tide\n3. Surf Excel\n4. Rin\n5. Henko\n6. Patanjali\n7. Ghadi\n8. Wheel\n9. Love & Care\n10. Born Good\n11. Others (specify)\n12. None of the above\n\n> **Researcher Note:**\n> *   **Analysis:** Trial / Ever Used.\n> *   **Logic:** Mask/Filter based on Q12.\n> *   **Action:** Measures historical brand penetration.\n\n**Q14. [Multi Select]** *(Ask only for brands used in Previous Question)* Which of these laundry detergent brands have you used in the PAST 3 MONTHS?\n1. Ariel\n2. Tide\n3. Surf Excel\n4. Rin\n5. Henko\n6. Patanjali\n7. Ghadi\n8. Wheel\n9. Love & Care\n10. Born Good\n11. Others (specify)\n12. None of the above\n\n> **Researcher Note:**\n> *   **Analysis:** Recent Usage / Regular Repertoire.\n> *   **Logic:** Mask/Filter based on Q13.\n> *   **Action:** Identifies current active market share and repertoire size.\n\n**Q15. [Single Select]** *(Ask only for brands used in Previous Question)* Which ONE of these laundry detergent brands do you use MOST OFTEN?\n1. Ariel\n2. Tide\n3. Surf Excel\n4. Rin\n5. Henko\n6. Patanjali\n7. Ghadi\n8. Wheel\n9. Love & Care\n10. Born Good\n11. Others (specify)\n12. None of the above\n\n> **Researcher Note:**\n> *   **Analysis:** Brand Loyalty / Most Often Used (MOU).\n> *   **Logic:** Mask/Filter based on Q14. Single punch.\n> *   **Action:** Determines the primary competitor to benchmark the P&G prototypes against.\n\n**Q16. [Grid - Single Select]** 🚨 **Reputation Risk:** How much do you agree or disagree that the brand you use MOST OFTEN is associated with harsh chemicals that damage clothes or skin?\n\n**Scale:** 1 = Strongly Disagree, 2 = Disagree, 3 = Neutral, 4 = Agree, 5 = Strongly Agree\n\n| Attribute | 1 | 2 | 3 | 4 | 5 |\n| :--- | :---: | :---: | :---: | :---: | :---: |\n| Uses harsh chemicals | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Damages fabric over time | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Causes skin irritation / allergies | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Harmful to the environment | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Lacks transparency in ingredients | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Has been involved in negative controversies | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Feels unsafe for baby clothes | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Overall negative brand reputation | ( ) | ( ) | ( ) | ( ) | ( ) |\n\n> **Researcher Note:**\n> *   **Analysis:** Brand Trust & Risk Assessment.\n> *   **Logic:** None.\n> *   **Action:** Highlights vulnerabilities in current market leaders that P&G can exploit via safer formulations.\n\n**Q17. [Single Select]** 🆕 **New Brand Insight:** In the last 6 months, have you tried any newly launched, digital-first, or eco-friendly detergent brands (e.g., Born Good, Koparo)?\n1. Yes, and I switched to them completely\n2. Yes, but I use them alongside my regular brand\n3. Yes, but I stopped using them\n4. No, but I am interested in trying them\n5. No, and I have no interest\n\n> **Researcher Note:**\n> *   **Analysis:** Innovation Adoption Rate.\n> *   **Logic:** None.\n> *   **Action:** Measures the threat level of new D2C entrants against legacy FMCG brands.\n\n**Q18. [Single Select]** 💡 **Innovation Insight:** How interested are you in laundry detergents specifically formulated to sync with AI-powered or Smart Washing Machines (e.g., auto-dosing, optimized cold wash cycles)?\n1. Extremely interested\n2. Very interested\n3. Moderately interested\n4. Slightly interested\n5. Not at all interested\n\n> **Researcher Note:**\n> *   **Analysis:** Future Tech Receptivity.\n> *   **Logic:** None.\n> *   **Action:** Guides R&D for future P&G product lines aligned with consumer appliance upgrades.\n\n**Q19. [Single Select]** 🌍 **Cultural Insight:** If a smart washing machine app tracks your laundry habits to automatically order detergent for you, how concerned are you about data privacy?\n1. Extremely concerned\n2. Very concerned\n3. Moderately concerned\n4. Slightly concerned\n5. Not at all concerned\n\n> **Researcher Note:**\n> *   **Analysis:** Cultural & Ethical Sentiment.\n> *   **Logic:** None.\n> *   **Action:** Informs the go-to-market strategy for IoT/Subscription-based detergent models.\n\n---\n**PRODUCT TESTING: PROTOTYPE A**\n*Please review the following concept for a new P&G laundry detergent.*\n**Concept A: \"Ariel Deep Clean Pro-Liquid: Advanced AI-Enzyme technology that removes 99% of invisible stains even in quick cold-water washes, saving energy and fabric life.\"**\n---\n\n**Q20. [Single Select]** Based on the description above, what is your overall opinion of Prototype A?\n1. Dislike it extremely\n2. Dislike it somewhat\n3. Neither like nor dislike\n4. Like it somewhat\n5. Like it extremely\n\n> **Researcher Note:**\n> *   **Analysis:** Top 2 Box (T2B) Liking.\n> *   **Logic:** None.\n> *   **Action:** Primary metric for monadic concept success.\n\n**Q21. [Open End]** What specifically do you LIKE about Prototype A?\n[Text Box]\n\n> **Researcher Note:**\n> *   **Analysis:** Text Analytics.\n> *   **Logic:** None. *[FRAUD CHECK] check for gibberish, repeated characters, or very short responses (less than 3 words).*\n> *   **Action:** Identifies the strongest resonating claims of the concept.\n\n**Q22. [Single Select]** How unique do you find the concept of Prototype A compared to products currently available in the market?\n1. Not at all unique\n2. Slightly unique\n3. Moderately unique\n4. Very unique\n5. Extremely unique\n\n> **Researcher Note:**\n> *   **Analysis:** Concept Differentiation.\n> *   **Logic:** None.\n> *   **Action:** Assesses if the AI-Enzyme claim stands out in a crowded FMCG space.\n\n**Q23. [Grid - Single Select]** Please rate Prototype A on the following attributes based on your expectations.\n\n**Scale:** 1 = Very Poor, 2 = Poor, 3 = Fair, 4 = Good, 5 = Excellent\n\n| Attribute | 1 | 2 | 3 | 4 | 5 |\n| :--- | :---: | :---: | :---: | :---: | :---: |\n| Stain removal capability | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Suitability for cold water | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Energy saving aspect | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Fabric protection | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Modern / Advanced technology | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Trust in the brand | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Ease of use | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Overall Rating | ( ) | ( ) | ( ) | ( ) | ( ) |\n\n> **Researcher Note:**\n> *   **Analysis:** Diagnostic Attribute Rating.\n> *   **Logic:** None.\n> *   **Action:** Pinpoints specific strengths and weaknesses of Prototype A's value proposition.\n\n**Q24. [Single Select]** If Prototype A were available at a price similar to premium liquid detergents (e.g., Surf Excel Matic Liquid), how likely would you be to buy it?\n1. Definitely would not buy\n2. Probably would not buy\n3. Might or might not buy\n4. Probably would buy\n5. Definitely would buy\n\n> **Researcher Note:**\n> *   **Analysis:** Purchase Intent (PI).\n> *   **Logic:** None.\n> *   **Action:** Key metric for volumetric forecasting and sales potential.\n\n**Q25. [Single Select]** Do you believe the claims made by Prototype A (e.g., removes invisible stains in cold water)?\n1. Completely disbelieve\n2. Somewhat disbelieve\n3. Neither believe nor disbelieve\n4. Somewhat believe\n5. Completely believe\n\n> **Researcher Note:**\n> *   **Analysis:** Claim Believability.\n> *   **Logic:** None.\n> *   **Action:** Indicates if the marketing language needs to be toned down or backed by scientific proof.\n\n**Q26. [Single Select]** How relevant is the \"energy saving via cold water wash\" benefit to your daily life?\n1. Not at all relevant\n2. Slightly relevant\n3. Moderately relevant\n4. Very relevant\n5. Extremely relevant\n\n> **Researcher Note:**\n> *   **Analysis:** Benefit Relevance.\n> *   **Logic:** None.\n> *   **Action:** Determines if sustainability translates to practical consumer value in India.\n\n---\n**PRODUCT TESTING: PROTOTYPE B**\n*Please review the following concept for a second new P&G laundry detergent.*\n**Concept B: \"Tide Eco-Pods: 100% Plant-based, biodegradable detergent pods wrapped in plastic-free packaging. Tough on stains, gentle on the planet.\"**\n---\n\n**Q27. [Single Select]** Based on the description above, what is your overall opinion of Prototype B?\n1. Dislike it extremely\n2. Dislike it somewhat\n3. Neither like nor dislike\n4. Like it somewhat\n5. Like it extremely\n\n> **Researcher Note:**\n> *   **Analysis:** Top 2 Box (T2B) Liking.\n> *   **Logic:** None.\n> *   **Action:** Primary metric for monadic concept success for the second prototype.\n\n**Q28. [Open End]** What specifically do you LIKE about Prototype B?\n[Text Box]\n\n> **Researcher Note:**\n> *   **Analysis:** Text Analytics.\n> *   **Logic:** None. *[FRAUD CHECK] check for gibberish, repeated characters, or very short responses (less than 3 words).*\n> *   **Action:** Identifies the strongest resonating claims of the eco-friendly concept.\n\n**Q29. [Single Select]** How unique do you find the concept of Prototype B compared to products currently available in the market?\n1. Not at all unique\n2. Slightly unique\n3. Moderately unique\n4. Very unique\n5. Extremely unique\n\n> **Researcher Note:**\n> *   **Analysis:** Concept Differentiation.\n> *   **Logic:** None.\n> *   **Action:** Assesses if the plant-based pod format is seen as a true innovation.\n\n**Q30. [Grid - Single Select]** Please rate Prototype B on the following attributes based on your expectations.\n\n**Scale:** 1 = Very Poor, 2 = Poor, 3 = Fair, 4 = Good, 5 = Excellent\n\n| Attribute | 1 | 2 | 3 | 4 | 5 |\n| :--- | :---: | :---: | :---: | :---: | :---: |\n| Eco-friendly ingredients | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Plastic-free packaging | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Convenience of pod format | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Stain removal capability | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Safety for family/skin | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Modern / Innovative format | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Value for money | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Overall Rating | ( ) | ( ) | ( ) | ( ) | ( ) |\n\n> **Researcher Note:**\n> *   **Analysis:** Diagnostic Attribute Rating.\n> *   **Logic:** None.\n> *   **Action:** Pinpoints specific strengths and weaknesses of Prototype B.\n\n**Q31. [Single Select]** If Prototype B were priced at a 15% premium compared to regular liquid detergents, how likely would you be to buy it?\n1. Definitely would not buy\n2. Probably would not buy\n3. Might or might not buy\n4. Probably would buy\n5. Definitely would buy\n\n> **Researcher Note:**\n> *   **Analysis:** Price Premium Tolerance & Purchase Intent.\n> *   **Logic:** None.\n> *   **Action:** Tests pricing elasticity for sustainability-driven FMCG products.\n\n**Q32. [Single Select]** Do you believe the claims made by Prototype B (e.g., tough on stains despite being 100% plant-based)?\n1. Completely disbelieve\n2. Somewhat disbelieve\n3. Neither believe nor disbelieve\n4. Somewhat believe\n5. Completely believe\n\n> **Researcher Note:**\n> *   **Analysis:** Claim Believability.\n> *   **Logic:** None.\n> *   **Action:** Checks for the \"greenwashing\" skepticism often seen in natural products.\n\n**Q33. [Single Select]** How comfortable are you using a \"Pod\" format instead of traditional powder or liquid?\n1. Not at all comfortable\n2. Slightly comfortable\n3. Moderately comfortable\n4. Very comfortable\n5. Extremely comfortable\n\n> **Researcher Note:**\n> *   **Analysis:** Format Adoption Readiness.\n> *   **Logic:** None.\n> *   **Action:** Identifies behavioral barriers to adopting unit-dose detergents in India.\n\n---\n**COMPARATIVE EVALUATION**\n---\n\n**Q34. [Grid - Single Select]** Now that you have seen both Prototype A (AI-Enzyme Liquid) and Prototype B (Plant-based Pods), please indicate which you prefer on the following dimensions.\n\n**Scale:** 1 = Strongly Prefer A, 2 = Somewhat Prefer A, 3 = No Preference, 4 = Somewhat Prefer B, 5 = Strongly Prefer B\n\n| Attribute | 1 | 2 | 3 | 4 | 5 |\n| :--- | :---: | :---: | :---: | :---: | :---: |\n| Better cleaning power | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Better for the environment | ( ) | ( ) | ( ) | ( ) | ( ) |\n| More innovative | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Better value for money | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Easier to use daily | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Safer for my family | ( ) | ( ) | ( ) | ( ) | ( ) |\n| More likely to replace my current brand | ( ) | ( ) | ( ) | ( ) | ( ) |\n| Overall Preference | ( ) | ( ) | ( ) | ( ) | ( ) |\n\n> **Researcher Note:**\n> *   **Analysis:** Paired Comparison / Preference mapping.\n> *   **Logic:** None.\n> *   **Action:** Directly pits the two P&G innovation pipelines against each other.\n\n**Q35. [Single Select]** Which of these did you like the best?\n1. Prototype A (Ariel Deep Clean Pro-Liquid)\n2. Prototype B (Tide Eco-Pods)\n3. My current detergent brand\n4. None of these\n\n> **Researcher Note:**\n> *   **Analysis:** Single Best Preference / Winner Declaration.\n> *   **Logic:** Mandatory Rule applied.\n> *   **Action:** The ultimate metric to decide which prototype P&G should advance to the launch phase.\n\n---\n**PROFILING & DEMOGRAPHICS**\n---\n\n**Q36. [Single Select]** Including yourself, how many people currently live in your household?\n1. 1 (Live alone)\n2. 2\n3. 3 - 4\n4. 5 - 6\n5. 7 or more\n\n> **Researcher Note:**\n> *   **Analysis:** Household Size Profiling.\n> *   **Logic:** None.\n> *   **Action:** Correlates household size with detergent volume consumption and format preference.\n\n**Q37. [Single Select]** Do you have any children under the age of 12 living in your household?\n1. Yes\n2. No\n\n> **Researcher Note:**\n> *   **Analysis:** Lifestage Profiling.\n> *   **Logic:** None.\n> *   **Action:** Households with kids often prioritize stain removal and safety, acting as a key cross-tabulation variable.\n\n**Q38. [Single Select]** What is your current employment status?\n1. Employed Full-Time\n2. Employed Part-Time\n3. Self-Employed / Business Owner\n4. Homemaker\n5. Student\n6. Unemployed / Other\n\n> **Researcher Note:**\n> *   **Analysis:** Occupational Profiling.\n> *   **Logic:** None.\n> *   **Action:** Helps segment time-poor consumers (who might prefer pods/liquids) vs homemakers.\n\n---\n\n### THANK YOU PAGE\n\n**CLOSING:**\n\"Thank you for your time and valuable feedback! Your responses have been successfully recorded. The insights you provided will help shape the future of household care products. You may now close this window.\"";
        document.getElementById('content').innerHTML = marked.parse(rawMarkdown);
